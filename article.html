<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טוען כתבה... | מגזין עתיד שמיר</title>
    <link rel="icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ====== TOP SCHOOL NAVBAR (also on article pages) ====== -->
<nav class="school-nav" id="schoolNav">
    <div class="school-nav-inner">
        <a href="#" class="school-nav-logo" aria-label="לאתר בית הספר">
            <img src="logo.png" alt="לוגו בית הספר">
        </a>
        <ul class="school-nav-links">
            <li><a href="#"><i class="fa-solid fa-house"></i><span>בית</span></a></li>
            <li><a href="index.html" class="active"><i class="fa-solid fa-newspaper"></i><span>מגזין</span></a></li>
            <li><a href="#"><i class="fa-solid fa-users"></i><span>צוות</span></a></li>
            <li><a href="#"><i class="fa-solid fa-circle-info"></i><span>אודות</span></a></li>
            <li><a href="#"><i class="fa-solid fa-graduation-cap"></i><span>מגמות</span></a></li>
            <li><a href="#"><i class="fa-solid fa-list-check"></i><span>תוכניות</span></a></li>
            <li><a href="#"><i class="fa-solid fa-book-open"></i><span>חומרי למידה</span></a></li>
        </ul>
    </div>
</nav>

<!-- Mobile sticky bar: hamburger only (school-nav is hidden on mobile) -->
<div class="mobile-controls mobile-controls-article">
    <button class="hamburger-btn" onclick="toggleMobileMenu()" aria-label="תפריט">
        <span></span><span></span><span></span>
    </button>
</div>

<!-- Mobile menu -->
<div id="mobileMenu" class="mobile-menu">
    <div class="mobile-menu-content">
        <button class="close-menu" onclick="toggleMobileMenu()" aria-label="סגור"><i class="fa-solid fa-xmark"></i></button>
        <button class="close-menu-arrow" onclick="toggleMobileMenu()" aria-label="סגור תפריט"><i class="fa-solid fa-arrow-left"></i></button>

        <div class="mobile-menu-section">
            <h3><i class="fa-solid fa-compass"></i> ניווט באתר</h3>
            <a class="mm-link" href="#"><i class="fa-solid fa-house"></i> בית</a>
            <a class="mm-link active" href="index.html"><i class="fa-solid fa-newspaper"></i> מגזין</a>
            <a class="mm-link" href="#"><i class="fa-solid fa-users"></i> צוות</a>
            <a class="mm-link" href="#"><i class="fa-solid fa-circle-info"></i> אודות</a>
            <a class="mm-link" href="#"><i class="fa-solid fa-graduation-cap"></i> מגמות</a>
            <a class="mm-link" href="#"><i class="fa-solid fa-list-check"></i> תוכניות</a>
            <a class="mm-link" href="#"><i class="fa-solid fa-book-open"></i> חומרי למידה</a>
        </div>
    </div>
</div>
<div id="mobileMenuBackdrop" class="mobile-menu-backdrop" onclick="toggleMobileMenu()"></div>

<script>
function toggleMobileMenu() {
    document.getElementById('mobileMenu')?.classList.toggle('active');
    document.getElementById('mobileMenuBackdrop')?.classList.toggle('active');
    document.body.classList.toggle('menu-open');
}
</script>

<div class="article-layout">
    <aside class="related-side related-side-right" id="relatedRight" aria-label="כתבות נוספות"></aside>

    <main id="articleRoot" class="article-container">
        <div style="text-align:center; padding:60px 20px; color:#888;">טוען כתבה...</div>
    </main>

    <aside class="related-side related-side-left" id="relatedLeft" aria-label="כתבות נוספות"></aside>
</div>

<section class="related-mobile" id="relatedMobile" aria-label="כתבות נוספות"></section>

<footer>
    <p style="font-size:1.2rem; font-weight:700; margin:0 0 8px;">עתיד יצחק שמיר - רמלה</p>
    <p class="footer-credits">המגזין הדיגיטלי | נערך ועוצב ע"י <span class="footer-name">שמעון חיימוב</span> &copy; 2026</p>
</footer>

<button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="לראש העמוד">
    <i class="fa-solid fa-arrow-up"></i>
</button>

<script>
(function(){
    const btn = document.getElementById('scrollTopBtn');
    if (!btn) return;
    window.addEventListener('scroll', () => {
        btn.classList.toggle('show', window.scrollY > 400);
    }, { passive: true });
})();
</script>

<script src="articles.js"></script>
<script src="article.js"></script>
</body>
</html>
